<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rambam Visual Learning Engine</title>
<style>
body {
 font-family: Arial, sans-serif;
 background:#f4f6f9;
 margin:0;
 padding:20px;
 color:#111827;
}
.wrap {
 max-width:1200px;
 margin:auto;
}
header {
 background:#0f172a;
 color:white;
 padding:24px;
 border-radius:20px;
 margin-bottom:20px;
}
.grid {
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
 gap:16px;
}
.card {
 background:white;
 border-radius:18px;
 padding:14px;
 border:1px solid #dbe1ea;
 text-align:center;
 box-shadow:0 2px 6px rgba(0,0,0,0.06);
}
.card img {
 width:100%;
 border-radius:12px;
}
.num {
 width:38px;
 height:38px;
 background:#e2e8f0;
 border-radius:999px;
 display:flex;
 align-items:center;
 justify-content:center;
 font-weight:bold;
 margin:0 auto 10px auto;
}
.label {
 font-size:20px;
 font-weight:bold;
 margin-top:10px;
}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Rambam Visual Learning Engine</h1>
<p>Visual memory system for the 14 books of Mishneh Torah.</p>
</header>

<div class="grid">

    <div class="card">
      <div class="num">1</div>
      <img src="madda.jpeg" alt="Madda">
      <div class="label">Madda</div>
    </div>
    
    <div class="card">
      <div class="num">2</div>
      <img src="ahava.jpg" alt="Ahavah">
      <div class="label">Ahavah</div>
    </div>
    
    <div class="card">
      <div class="num">3</div>
      <img src="zmanim.jpg" alt="Zemanim">
      <div class="label">Zemanim</div>
    </div>
    
    <div class="card">
      <div class="num">4</div>
      <img src="nashim.jpg" alt="Nashim">
      <div class="label">Nashim</div>
    </div>
    
    <div class="card">
      <div class="num">5</div>
      <img src="kedusha.jpg" alt="Kedushah">
      <div class="label">Kedushah</div>
    </div>
    
    <div class="card">
      <div class="num">6</div>
      <img src="haflaah.jpg" alt="Haflaah">
      <div class="label">Haflaah</div>
    </div>
    
    <div class="card">
      <div class="num">7</div>
      <img src="zeraim.jpg" alt="Zeraim">
      <div class="label">Zeraim</div>
    </div>
    
    <div class="card">
      <div class="num">8</div>
      <img src="avodah.jpg" alt="Avodah">
      <div class="label">Avodah</div>
    </div>
    
    <div class="card">
      <div class="num">9</div>
      <img src="korbanos.jpg" alt="Korbanot">
      <div class="label">Korbanot</div>
    </div>
    
    <div class="card">
      <div class="num">10</div>
      <img src="taharah.jpg" alt="Taharah">
      <div class="label">Taharah</div>
    </div>
    
    <div class="card">
      <div class="num">11</div>
      <img src="nezikin.jpg" alt="Nezikin">
      <div class="label">Nezikin</div>
    </div>
    
    <div class="card">
      <div class="num">12</div>
      <img src="kinyan.jpg" alt="Kinyan">
      <div class="label">Kinyan</div>
    </div>
    
    <div class="card">
      <div class="num">13</div>
      <img src="mishpatim.png" alt="Mishpatim">
      <div class="label">Mishpatim</div>
    </div>
    
    <div class="card">
      <div class="num">14</div>
      <img src="shoftim.jpg" alt="Shoftim">
      <div class="label">Shoftim</div>
    </div>
    
</div>

</div>
</body>
</html>
